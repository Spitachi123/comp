<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Printer Schematic | Pro Teardown</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme */
            --bg: #050505;
            --sidebar: #0d0e12;
            --accent: #00f2ff;
            --panel: rgba(15, 15, 20, 0.98);
            --border: rgba(0, 242, 255, 0.2);
            --text: #ffffff;
            --text-dim: #666;
            --model-bg: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* Light Theme (Blueprint Mode) */
        [data-theme="light"] {
            --bg: #f0f2f5;
            --sidebar: #ffffff;
            --accent: #0070f3;
            --panel: rgba(255, 255, 255, 0.98);
            --border: rgba(0, 0, 0, 0.1);
            --text: #1a1a1a;
            --text-dim: #777;
            --model-bg: #e0e5ec;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            min-height: 150vh;
            transition: background 0.4s, color 0.4s;
        }

        /* --- NAVIGATION HEADER --- */
        .nav-header {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--sidebar); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn-nav { text-decoration: none; font-family: 'Orbitron'; font-size: 10px; padding: 8px 15px; border-radius: 4px; border: 1px solid var(--border); color: var(--text); transition: 0.3s; }
        .next-btn { background: var(--accent); color: #000; border: none; font-weight: bold; box-shadow: 0 0 10px var(--accent); }
        
        .theme-toggle {
            cursor: pointer; background: transparent; border: 1px solid var(--accent);
            color: var(--accent); padding: 5px 12px; font-family: 'Orbitron'; font-size: 9px;
        }

        /* --- VIEWPORT & MODES --- */
        .mode-sidebar {
            width: 100px; background: var(--sidebar); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 80px 10px; gap: 10px;
            position: fixed; left: 0; top: 0; height: 100%; z-index: 900;
        }

        .mode-btn {
            background: transparent; border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px 5px; font-family: 'Orbitron'; font-size: 9px; cursor: pointer;
        }
        .mode-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }

        .viewport {
            flex: 1; height: 100vh; position: sticky; top: 0; margin-left: 100px;
            display: flex; align-items: center; justify-content: center;
            perspective: 2000px; background: var(--model-bg);
        }

        .stack {
            position: relative; width: 300px; height: 200px;
            transform-style: preserve-3d; transform: rotateX(60deg) rotateZ(-30deg);
        }

        .layer {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid var(--accent); background: rgba(0, 242, 255, 0.03);
            display: flex; align-items: center; justify-content: center;
            transition: transform 0.1s linear;
        }

        /* --- PRINTER AREA --- */
        .content-area { width: 45%; padding: 100px 40px; }

        .terminal-module {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 30px; position: relative;
        }

        textarea {
            width: 100%; height: 60px; background: #000; color: var(--accent);
            border: 1px solid var(--border); padding: 10px; font-family: monospace;
            margin-bottom: 20px; outline: none; resize: none;
        }

        .printer-machine {
            width: 100%; height: 180px; background: #111;
            border-radius: 8px; position: relative; overflow: hidden;
            border: 4px solid #222;
        }

        .carriage { 
            position: absolute; top: 20px; left: 20px; width: 40px; height: 20px; 
            background: #333; border: 1px solid var(--accent); transition: left 0.1s linear; z-index: 10;
        }
        
        .nozzle-tip { position: absolute; bottom: -8px; left: 50%; width: 2px; height: 0; background: var(--accent); transition: height 0.1s; }

        .output-paper {
            position: absolute; top: 40px; left: 15%; width: 70%; height: 0;
            background: #fff; color: #000; font-family: 'Courier New', monospace;
            transition: height 1s ease, transform 1s ease;
            display: flex; align-items: center; justify-content: center; text-align: center;
        }
        .paper-visible { height: 120px; transform: translateY(100px); padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* --- POWER & CONTROLS --- */
        .controls { display: flex; gap: 15px; margin-top: 20px; align-items: center; }
        
        .power-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: 2px solid #444; 
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #444; transition: 0.3s;
        }
        .on .power-btn { border-color: #0f0; color: #0f0; box-shadow: 0 0 15px #0f0; text-shadow: 0 0 5px #0f0; }

        .exec-btn { 
            flex-grow: 1; padding: 15px; background: var(--accent); color: #000; 
            font-family: 'Orbitron'; font-weight: bold; cursor: pointer; border: none;
        }
        .exec-btn:disabled { background: #222; color: #444; cursor: not-allowed; opacity: 0.5; }

        /* --- REPORT --- */
        .simple-report {
            margin-top: 30px; padding: 20px; border: 1px dashed var(--accent);
            display: none; background: rgba(0, 242, 255, 0.05);
        }
        .report-item { display: flex; justify-content: space-between; font-size: 14px; margin-top: 10px; }
        .status-ok { color: #00ff88; font-weight: bold; }
    </style>
</head>
<body id="app" data-theme="dark">

    <header class="nav-header">
        <a href="home.html" class="btn-nav">← HOME</a>
        <button class="theme-toggle" onclick="toggleTheme()">DARK / WHITE MODE</button>
        <a href="print.html" class="btn-nav next-btn">NEXT: PRINT.HTML →</a>
    </header>

    <nav class="mode-sidebar">
        <button class="mode-btn active">FDM</button>
    </nav>

    <div class="viewport">
        <div class="stack" id="mainStack">
            <div class="layer" data-z="0"></div>
            <div class="layer" data-z="150"></div>
            <div class="layer" data-z="300"></div>
        </div>
    </div>

    <div class="content-area">
        <div class="terminal-module">
            <textarea id="userInput" placeholder="Type your message for the paper..."></textarea>
            
            <div class="printer-machine">
                <div id="statusLabel" style="position:absolute; top:10px; right:10px; font-size:9px; color:var(--accent); font-family:'Orbitron';">OFFLINE</div>
                <div class="carriage" id="carriage"><div class="nozzle-tip" id="nozzle"></div></div>
                
                <div class="output-paper" id="paper">
                    <p id="printedText" style="font-size: 16px; font-weight:bold;"></p>
                </div>
            </div>

            <div class="controls">
                <div class="power-btn" onclick="togglePower()">⏻</div>
                <button id="startBtn" class="exec-btn" onclick="startPrinting()" disabled>START PRINTING</button>
            </div>

            <div class="simple-report" id="reportArea">
                <h3 style="font-family: 'Orbitron'; font-size: 13px; color: var(--accent);">HEALTH CHECK</h3>
                <div class="report-item"><span>Paper Feeding:</span> <span class="status-ok">GOOD</span></div>
                <p style="font-size:12px; color:#888;">The paper moved perfectly through the rollers.</p>
                
                <div class="report-item" style="margin-top:15px;"><span>Ink & Smudge:</span> <span class="status-ok">CLEAN</span></div>
                <p style="font-size:12px; color:#888;">The ink is dry and there are no messy spots!</p>
            </div>
        </div>
    </div>

    <script>
        let isPowered = false;

        // Theme Toggle
        function toggleTheme() {
            const body = document.getElementById('app');
            const current = body.getAttribute('data-theme');
            body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
        }

        // Scroll Logic for 3D stack
        window.addEventListener('scroll', () => {
            const scrollPercent = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
            document.querySelectorAll('.layer').forEach(layer => {
                const zFactor = layer.getAttribute('data-z');
                layer.style.transform = `translateZ(${zFactor * scrollPercent * 2.5}px)`;
            });
        });

        // Power Logic
        function togglePower() {
            isPowered = !isPowered;
            document.getElementById('app').classList.toggle('on');
            document.getElementById('startBtn').disabled = !isPowered;
            document.getElementById('statusLabel').innerText = isPowered ? "READY" : "OFFLINE";
        }

        // Printing Animation
        async function startPrinting() {
            const text = document.getElementById('userInput').value || "Bala's Print";
            const paper = document.getElementById('paper');
            const printedText = document.getElementById('printedText');
            const carriage = document.getElementById('carriage');
            const nozzle = document.getElementById('nozzle');
            const status = document.getElementById('statusLabel');

            // Reset
            paper.classList.remove('paper-visible');
            printedText.innerText = "";
            document.getElementById('reportArea').style.display = 'none';

            status.innerText = "PRINTING...";
            for (let i = 0; i < text.length; i++) {
                carriage.style.left = (Math.random() * 200 + 20) + "px";
                nozzle.style.height = "12px";
                await wait(150);
                printedText.innerText += text[i];
                nozzle.style.height = "0px";
            }

            status.innerText = "EJECTING...";
            await wait(500);
            paper.classList.add('paper-visible');
            
            await wait(1000);
            status.innerText = "FINISHED";
            document.getElementById('reportArea').style.display = 'block';
        }

        function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    </script>
</body>
</html>
