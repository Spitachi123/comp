<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Members - Elite AI Interface</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at center, #0f2027, #000000 80%);
            overflow: hidden;
            font-family: 'Orbitron', sans-serif;
            color: #00ffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* STAR BACKGROUND */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
            z-index: -2;
        }

        @keyframes twinkle {
            from { opacity: 0.2; }
            to { opacity: 1; }
        }

        /* AI CORE (UPGRADED) */
        .brain {
            position: absolute;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 60px rgba(0, 255, 255, 0.1);
            animation: rotate 30s linear infinite;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
        }

        .brain::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            border: 1px dashed #00ffff;
            border-radius: 50%;
            opacity: 0.3;
            animation: rotate 15s linear infinite reverse;
        }

        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* GLASS CONTAINER */
        .container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 60px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            animation: fadeIn 1.5s ease-out;
            width: 480px;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px cyan;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        /* MEMBER LIST */
        .member {
            margin: 15px 0;
            font-size: 16px;
            padding: 15px;
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: translateY(20px);
            background: rgba(0, 255, 255, 0.01);
            position: relative;
        }

        .member.show {
            opacity: 1;
            transform: translateY(0);
        }

        .member:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            transform: scale(1.05);
        }

        /* --- ULTRA VIP CAPTAIN STYLE --- */
        .member.captain {
            border: 2px solid #ffcc00 !important;
            color: #fff !important;
            font-weight: 900;
            background: linear-gradient(90deg, rgba(255, 204, 0, 0.1), rgba(255, 255, 255, 0.05), rgba(255, 204, 0, 0.1)) !important;
            box-shadow: 0 0 30px rgba(255, 204, 0, 0.4), inset 0 0 10px rgba(255, 204, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            overflow: hidden;
        }

        /* Moving VIP Light Sweep */
        .member.captain::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: sweep 4s infinite;
        }

        @keyframes sweep {
            0% { left: -150%; }
            30% { left: 150%; }
            100% { left: 150%; }
        }

        /* VIP Badge Styling */
        .captain::after {
            content: "⭐ ELITE";
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 8px;
            background: #ffcc00;
            color: #000;
            padding: 3px 8px;
            border-radius: 4px;
            box-shadow: 0 0 10px #ffcc00;
            font-weight: 900;
        }

        /* Floating Crown */
        .captain-crown {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 18px;
            filter: drop-shadow(0 0 10px #ffcc00);
            animation: bounce 2s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateX(-50%) translateY(0); }
            to { transform: translateX(-50%) translateY(-8px); }
        }

        .member.captain:hover {
            background: #ffcc00 !important;
            color: #000 !important;
            box-shadow: 0 0 50px #ffcc00 !important;
            transform: scale(1.1) rotate(-1deg);
        }

        /* BUTTON */
        button {
            margin-top: 40px;
            padding: 12px 35px;
            background: transparent;
            border: 1px solid cyan;
            color: cyan;
            font-family: 'Orbitron';
            font-size: 12px;
            letter-spacing: 2px;
            cursor: pointer;
            transition: 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        button:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 20px cyan;
            letter-spacing: 4px;
        }

        .fadeOut {
            animation: zoomOut 1.2s forwards;
        }

        @keyframes zoomOut {
            to { opacity: 0; transform: translate(-50%, -50%) scale(1.5); filter: blur(20px); }
        }

    </style>
</head>
<body>

<div class="brain"></div>

<div class="container" id="main">
    <h1>TEAM_CORE</h1>

    <div class="member captain">
        <span class="captain-crown">👑</span>
        Pratik Adhikari
    </div>

    <div class="member">Bijay Neupane</div>
    <div class="member">Sujan Pandey</div>
    <div class="member">Aayan Pokhrel</div>
    <div class="member">Krischal Adhikari</div>

    <button onclick="goBack()">Back</button>
</div>

<audio id="sound">
    <source src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_124bfa7c14.mp3">
</audio>

<script>
    // Star Generation
    for(let i=0; i<100; i++){
        let star = document.createElement("div");
        star.className = "star";
        star.style.top = Math.random() * 100 + "%";
        star.style.left = Math.random() * 100 + "%";
        star.style.animationDuration = (1 + Math.random() * 3) + "s";
        document.body.appendChild(star);
    }

    // Delayed Member Show
    const members = document.querySelectorAll(".member");
    members.forEach((m, i) => {
        setTimeout(() => {
            m.classList.add("show");
        }, 300 + (i * 200)); 
    });

    function goBack(){
        const audio = document.getElementById("sound");
        audio.volume = 0.5;
        audio.play();
        
        document.getElementById("main").classList.add("fadeOut");
        setTimeout(() => {
            window.location.href = "home.html";
        }, 1200);
    }
</script>

</body>
</html>
